# 启动：docker compose build --no-cache && docker compose up -d
# Apple Silicon 上构建、内网 x86 部署：已固定 platform 为 linux/amd64（含 sharp 等原生模块）
# 切勿将 ./api 挂载到 /app，否则会覆盖镜像内 node_modules
# 若 curl 本机 502，多半是 http_proxy，请 curl --noproxy '*'
services:
  web:
    image: nginx:alpine
    platform: linux/amd64
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    platform: linux/amd64
    build:
      context: ./api
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
